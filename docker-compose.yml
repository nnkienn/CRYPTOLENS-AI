services:
  db:
    image: postgres:15-alpine
    container_name: crypto_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cryptolens
    ports:
      - "9432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d cryptolens"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4
    container_name: crypto_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "10050:80"  # Đổi sang 10050
    depends_on:
      - db

  qdrant:
    image: qdrant/qdrant:latest
    container_name: crypto_qdrant
    restart: always
    ports:
      - "9333:6333"
    volumes:
      - qdata:/qdrant/storage
    environment:
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: crypto_rabbitmq
    restart: always
    ports:
      - "9672:5672"
      - "19672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: secret_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crypto_app
    restart: always
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "10000:8080"  # Đổi sang 10000
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy # Đợi RabbitMQ thực sự sẵn sàng
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  crypto_worker:
    build:
      context: ./backend
    container_name: crypto_worker
    restart: on-failure # Chỉ restart khi lỗi, tránh vòng lặp nếu code lỗi
    working_dir: /app
    volumes:
      - ./backend:/app
    command: python app/worker.py 
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://admin:admin@db:5432/cryptolens
      - RABBITMQ_URL=amqp://admin:secret_password@rabbitmq:5672/

volumes:
  pgdata:
  qdata:
  rabbitmq_data: